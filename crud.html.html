<!DOCTYPE html>
<html>
<head>
    <title>CRUD</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
        }

        h2 {
            color: #333;
        }

        input {
            padding: 8px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
            margin: 5px;
        }

        .addBtn {
            background-color: green;
        }

        .editBtn {
            background-color: orange;
        }

        .deleteBtn {
            background-color: red;
        }

        li {
            background: white;
            margin: 10px auto;
            padding: 10px;
            width: 250px;
            border-radius: 8px;
            box-shadow: 0px 0px 5px gray;
        }
    </style>
</head>
<body>

<h2>CRUD</h2>

<input type="text" id="input" placeholder="Enter name">
<button class="addBtn" onclick="add()">Add</button>

<ul id="list"></ul>

<script>
let arr = [];

function show() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    for (let i = 0; i < arr.length; i++) {
        list.innerHTML += `
        <li>
            ${arr[i]}
            <button class="editBtn" onclick="edit(${i})">Edit</button>
            <button class="deleteBtn" onclick="del(${i})">Delete</button>
        </li>`;
    }
}

// CREATE
function add() {
    let value = document.getElementById("input").value;
    if(value=="") return alert("Enter name!");
    arr.push(value);
    document.getElementById("input").value="";
    show();
}

// UPDATE
function edit(i) {
    let newValue = prompt("Edit:", arr[i]);
    if(newValue) {
        arr[i] = newValue;
        show();
    }
}

// DELETE
function del(i) {
    arr.splice(i, 1);
    show();
}

// READ
show();
</script>

</body>
</html>
